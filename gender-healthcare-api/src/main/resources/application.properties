# ============================
# DATABASE - MySQL
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/gender_healthcare?useUnicode=true&characterEncoding=utf8&characterSetResults=utf8&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate tự động tạo bảng
spring.jpa.hibernate.ddl-auto=create-drop

# Hiển thị SQL log
spring.jpa.show-sql=true

# Chạy file SQL khởi tạo dữ liệu
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.jpa.defer-datasource-initialization=true
# Hibernate dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# ============================
# SERVER CONFIG
# ============================
server.port=8086

# ============================
# SPRING SECURITY - Static User
# ============================
spring.security.user.name=bob
spring.security.user.password=bob
spring.security.user.roles=USER

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
